<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number Tracker</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #ffffff;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px;
    min-height: 100vh;
  }
  input {
    width: 100%;
    max-width: 400px;
    padding: 18px;
    margin: 10px 0;
    font-size: 20px;
    border: 2px solid #ccc;
    border-radius: 10px;
    outline: none;
  }
  input:focus { border-color: #4285f4; }
  button {
    width: 100%;
    max-width: 400px;
    padding: 18px;
    margin: 20px 0 0;
    font-size: 22px;
    background: #4285f4;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:active { background: #3367d6; }
  #status {
    margin-top: 20px;
    font-size: 18px;
    min-height: 24px;
  }
  #totals {
    width: 100%;
    max-width: 400px;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    justify-content: space-around;
    text-align: center;
  }
  .totalBox { flex: 1; }
  .totalLabel {
    font-size: 14px;
    color: #777;
    margin-bottom: 6px;
  }
  .totalValue {
    font-size: 32px;
    font-weight: 600;
    color: #202124;
  }
</style>
</head>
<body>
  <div id="totals">
    <div class="totalBox">
      <div class="totalLabel">Today's Count</div>
      <div class="totalValue" id="countValue">-</div>
    </div>
    <div class="totalBox">
      <div class="totalLabel">Today's Entries</div>
      <div class="totalValue" id="entriesValue">-</div>
    </div>
  </div>

  <input type="text" id="name" placeholder="Name" autocomplete="off">
  <input type="number" id="number" placeholder="Kjs" inputmode="numeric">
  <input type="number" id="multiplier" placeholder="Serve multiplier" inputmode="decimal">
  <button id="send">Send</button>
  <div id="status"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtSR2oiRlhbaX5THr44uzqYJ4IGkyvcg5xcfZaCJHlLYLLQ4VEcSUT_Ph_ukABPa4E/exec";

  const btn = document.getElementById("send");
  const status = document.getElementById("status");

  function loadTotals() {
    fetch(SCRIPT_URL)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        document.getElementById("countValue").textContent = data.count;
        document.getElementById("entriesValue").textContent = data.entries;
      })
      .catch(function() {
        // leave the dashes if it can't load
      });
  }

  btn.addEventListener("click", function() {
    const name = document.getElementById("name").value.trim();
    const numberRaw = document.getElementById("number").value.trim();
    const multiplierRaw = document.getElementById("multiplier").value.trim();

    if (!numberRaw) {
      status.textContent = "Enter a number.";
      status.style.color = "#d93025";
      return;
    }

    let number = parseFloat(numberRaw);
    if (isNaN(number)) {
      status.textContent = "Number is not valid.";
      status.style.color = "#d93025";
      return;
    }

    if (multiplierRaw) {
      const multiplier = parseFloat(multiplierRaw);
      if (isNaN(multiplier)) {
        status.textContent = "Multiplier is not valid.";
        status.style.color = "#d93025";
        return;
      }
      number = number * multiplier;
    }

    status.textContent = "off i go...";
    status.style.color = "#555";

    const data = new URLSearchParams();
    data.append("name", name);
    data.append("number", number);

    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: data })
      .then(function() {
        status.textContent = "Yarr sent!";
        status.style.color = "#188038";
        document.getElementById("name").value = "";
        document.getElementById("number").value = "";
        document.getElementById("multiplier").value = "";
        setTimeout(loadTotals, 1500);
      })
      .catch(function() {
        status.textContent = "Failed. Try again.";
        status.style.color = "#d93025";
      });
  });

  loadTotals();
</script>
</body>
</html>
